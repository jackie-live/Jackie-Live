<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackie Live</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="http://jackielive.com/">
    <meta property="og:title" content="Jackie Live">
    <meta property="og:description" content="Official site for Jackie Live. Streams, socials, and more.">
    <meta property="og:image" content="https://i.imgur.com/nrdPOkK.png">

    <link rel="icon" href="j-favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Trebuchet MS", Arial, sans-serif;
            background: #0E0E0E;
            color: #F0EDE8;
            overflow: hidden;
        }

        /* ── Hero ── */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center 20%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                transparent 40%,
                rgba(10, 8, 20, 0.72) 75%,
                rgba(10, 8, 20, 0.92) 100%
            );
            pointer-events: none;
        }

        /* ── Bottom HUD ── */
        .hud {
            position: relative;
            z-index: 10;
            padding: 0 5% 4% 5%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 18px;
        }

        /* ── Name ── */
        .site-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: clamp(2.4rem, 6vw, 5rem);
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #F0EDE8;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.9)) drop-shadow(0 0 14px rgba(0,0,0,0.7));
            line-height: 1;
        }

        /* ── Icon rows ── */
        .icon-group {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .icon-row {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .icon-divider {
            width: 100%;
            height: 1px;
            background: #7B4FFF;
            opacity: 0.55;
            margin: 2px 0;
        }

        /* ── Individual icon button ── */
        .icon-btn {
            position: relative;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #F0EDE8;
            font-size: 1rem;
            text-decoration: none;
            transition: background 0.22s, transform 0.18s;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.7));
        }

        .icon-btn:hover,
        .icon-btn:focus-visible {
            background: #7B4FFF;
            transform: translateY(-3px);
            outline: none;
        }

        .icon-btn.donate:hover,
        .icon-btn.donate:focus-visible {
            background: #C0392B;
        }

        /* ── Tooltip ── */
        .icon-btn .tip {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            background: rgba(10,8,20,0.9);
            color: #F0EDE8;
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            padding: 3px 7px;
            border-radius: 3px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.18s, transform 0.18s;
        }

        .icon-btn:hover .tip,
        .icon-btn:focus-visible .tip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Copyright ── */
        .copyright {
            position: absolute;
            left: 5%;
            bottom: 3%;
            z-index: 10;
            font-size: 0.72rem;
            color: rgba(240,237,232,0.55);
            letter-spacing: 0.04em;
        }

        .copyright a { color: inherit; text-decoration: none; }
        .copyright a:hover { text-decoration: underline; }

        /* ════════════════════════════════════
           INSET PANEL
        ════════════════════════════════════ */
        .inset {
            position: absolute;
            top: 3%;
            right: 3%;
            z-index: 20;
            width: 300px;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(10, 8, 20, 0.75);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(123, 79, 255, 0.28);
            box-shadow: 0 8px 36px rgba(0,0,0,0.65);
            transition: border-color 0.4s;
        }

        /* When live, swap border to Twitch purple */
        .inset.is-live {
            border-color: rgba(145, 70, 255, 0.7);
            box-shadow: 0 8px 36px rgba(145,70,255,0.25);
        }

        /* ── Header bar ── */
        .inset-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(123, 79, 255, 0.2);
            min-height: 36px;
        }

        .inset-header-icon {
            font-size: 0.82rem;
            color: #F0EDE8;
            opacity: 0.7;
        }

        .inset-label {
            font-size: 0.62rem;
            letter-spacing: 0.13em;
            text-transform: uppercase;
            color: rgba(240,237,232,0.55);
            flex: 1;
        }

        /* LIVE pill */
        .live-pill {
            display: none;
            align-items: center;
            gap: 5px;
            background: #9146FF;
            color: #fff;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .live-pill .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #fff;
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.75); }
        }

        .inset.is-live .live-pill { display: flex; }

        /* ── Content area ── */
        .inset-body {
            position: relative;
        }

        /* Ad slot — shown by default */
        .ad-slot {
            width: 100%;
            display: block;
        }

        /* Live player — hidden until online event fires */
        .live-player {
            display: none;
            width: 100%;
            aspect-ratio: 16/9;
        }

        .live-player iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .inset.is-live .ad-slot   { display: none; }
        .inset.is-live .live-player { display: block; }

        /* Live CTA bar below player */
        .live-cta {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 12px;
            border-top: 1px solid rgba(145,70,255,0.25);
            background: rgba(145,70,255,0.08);
        }

        .live-cta a {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #B084FF;
            text-decoration: none;
            font-weight: 600;
        }

        .live-cta a:hover { color: #fff; }

        .inset.is-live .live-cta { display: flex; }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .inset { width: 240px; }
        }

        @media (max-width: 600px) {
            .inset { width: 180px; top: 2%; right: 2%; }
        }

        @media (max-width: 480px) {
            .icon-btn { width: 38px; height: 38px; font-size: 0.9rem; }
            .icon-row { gap: 8px; }
            .hud { padding-bottom: 6%; }
            .inset { display: none; }
        }
    </style>
</head>
<body>

    <!-- ══════════════════════════════════════

    ══════════════════════════════════════ -->
    <div class="inset" id="inset">

        <!-- Header -->
        <div class="inset-header">

            <span class="live-pill"><span class="dot"></span>Live</span>

        <!-- Body -->
        <div class="inset-body">

                    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

                <div style="

            </div>

            <!-- ── Twitch live player (hidden until live) ── -->
            <div class="live-player" id="live-player">

        </div>

        <!-- Live CTA -->
        <div class="live-cta">

    </div>

    <!-- Twitch embed SDK -->
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>

    <script>
        // ── Twitch live detection + player swap ────────────────────────────
        //
        // Strategy: create a hidden Twitch.Player instance. It fires
        // Twitch.Player.ONLINE when the channel is live and
        // Twitch.Player.OFFLINE when it ends. On ONLINE we show the
        // player (autoplay muted); on OFFLINE we restore the ad.
        //
        // The embed SDK requires the page to be served from a registered
        // domain in the Twitch developer console. For local file:// testing
        // the player will still load but may show an "embed not allowed"
        // warning — it works fine on the live domain.

        const TWITCH_CHANNEL = 'JackieUnchained';

        const inset      = document.getElementById('inset');
        const livePlayer = document.getElementById('live-player');
        const insetLabel = document.getElementById('inset-label');
        const insetIcon  = document.getElementById('inset-icon');

        // Create a tiny off-screen div for the player to mount into,
        // then move its iframe into the visible slot on ONLINE.
        const mountDiv = document.createElement('div');
        mountDiv.style.cssText = 'position:absolute;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;';
        document.body.appendChild(mountDiv);

        const player = new Twitch.Player(mountDiv, {
            channel:    TWITCH_CHANNEL,
            width:      '100%',
            height:     '100%',
            muted:      true,
            autoplay:   true,
            allowfullscreen: false,
        });

        player.addEventListener(Twitch.Player.ONLINE, () => {
            // Move the iframe into the visible live-player slot
            const iframe = mountDiv.querySelector('iframe');
            if (iframe) {
                iframe.style.cssText = '';   // clear the hidden styles
                livePlayer.appendChild(iframe);
            }
            inset.classList.add('is-live');
            insetLabel.textContent = 'Live now';
            insetIcon.className = 'fab fa-twitch inset-header-icon';
            insetIcon.style.color = '#9146FF';
            insetIcon.style.opacity = '1';
        });

        player.addEventListener(Twitch.Player.OFFLINE, () => {
            // Move iframe back to hidden mount, restore ad
            const iframe = livePlayer.querySelector('iframe');
            if (iframe) mountDiv.appendChild(iframe);
            inset.classList.remove('is-live');
            insetLabel.textContent = 'Sponsored';
            insetIcon.style.color = '';
            insetIcon.style.opacity = '0.7';
        });
    </script>
