    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Trebuchet MS", Arial, sans-serif;
            background: #0E0E0E;
            color: #F0EDE8;
            overflow: hidden;
        }

        /* ── Hero ── */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center 20%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                transparent 40%,
                rgba(10, 8, 20, 0.72) 75%,
                rgba(10, 8, 20, 0.92) 100%
            );
            pointer-events: none;
        }

        /* ── Bottom HUD ── */
        .hud {
            position: relative;
            z-index: 10;
            padding: 0 5% 4% 5%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 18px;
        }

        /* ── Name ── */
        .site-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: clamp(2.4rem, 6vw, 5rem);
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #F0EDE8;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.9)) drop-shadow(0 0 14px rgba(0,0,0,0.7));
            line-height: 1;
        }

        /* ── Icon rows ── */
        .icon-group {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .icon-row {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .icon-divider {
            width: 100%;
            height: 1px;
            background: #7B4FFF;
            opacity: 0.55;
            margin: 2px 0;
        }

        /* ── Individual icon button ── */
        .icon-btn {
            position: relative;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #F0EDE8;
            font-size: 1rem;
            text-decoration: none;
            transition: background 0.22s, transform 0.18s;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.7));
        }

        .icon-btn:hover,
        .icon-btn:focus-visible {
            background: #7B4FFF;
            transform: translateY(-3px);
            outline: none;
        }

        .icon-btn.donate:hover,
        .icon-btn.donate:focus-visible {
            background: #C0392B;
        }

        /* ── Tooltip ── */
        .icon-btn .tip {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            background: rgba(10,8,20,0.9);
            color: #F0EDE8;
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            padding: 3px 7px;
            border-radius: 3px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.18s, transform 0.18s;
        }

        .icon-btn:hover .tip,
        .icon-btn:focus-visible .tip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Copyright ── */
        .copyright {
            position: absolute;
            left: 5%;
            bottom: 3%;
            z-index: 10;
            font-size: 0.72rem;
            color: rgba(240,237,232,0.55);
            letter-spacing: 0.04em;
        }

        .copyright a { color: inherit; text-decoration: none; }
        .copyright a:hover { text-decoration: underline; }

        /* ════════════════════════════════════
           INSET PANEL
        ════════════════════════════════════ */
        .inset {
            position: absolute;
            top: 5%;
            left: 5%;
            z-index: 20;
            width: 300px;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(10, 8, 20, 0.75);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(123, 79, 255, 0.28);
            box-shadow: 0 8px 36px rgba(0,0,0,0.65);
            transition: border-color 0.4s;
        }

        /* When live, swap border to Twitch purple */
        .inset.is-live {
            border-color: rgba(145, 70, 255, 0.7);
            box-shadow: 0 8px 36px rgba(145,70,255,0.25);
        }

        /* ── Header bar ── */
        .inset-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(123, 79, 255, 0.2);
            min-height: 36px;
        }

        .inset-header-icon {
            font-size: 0.82rem;
            color: #F0EDE8;
            opacity: 0.7;
        }

        .inset-label {
            font-size: 0.62rem;
            letter-spacing: 0.13em;
            text-transform: uppercase;
            color: rgba(240,237,232,0.55);
            flex: 1;
        }

        /* LIVE pill */
        .live-pill {
            display: none;
            align-items: center;
            gap: 5px;
            background: #9146FF;
            color: #fff;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .live-pill .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #fff;
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.75); }
        }

        .inset.is-live .live-pill { display: flex; }

        /* ── Content area ── */
        .inset-body {
            position: relative;
        }

        /* Ad slot — shown by default */
        .ad-slot {
            width: 100%;
            display: block;
        }

        /* Live player — hidden until online event fires */
        .live-player {
            display: none;
            width: 100%;
            aspect-ratio: 16/9;
        }

        .live-player iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .inset.is-live .ad-slot   { display: none; }
        .inset.is-live .live-player { display: block; }

        /* Live CTA bar below player */
        .live-cta {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 12px;
            border-top: 1px solid rgba(145,70,255,0.25);
            background: rgba(145,70,255,0.08);
        }

        .live-cta a {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #B084FF;
            text-decoration: none;
            font-weight: 600;
        }

        .live-cta a:hover { color: #fff; }

        .inset.is-live .live-cta { display: flex; }

        /* ── TikTok video container ── */
        .tiktok-slot {
            width: 100%;
            aspect-ratio: 9/16;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background: #000;
        }

        .tiktok-slot iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            pointer-events: none; /* so clicks pass to our handler */
        }

        .tiktok-slot .expand-hint {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            background: rgba(0,0,0,0.28);
        }

        .tiktok-slot:hover .expand-hint {
            opacity: 1;
        }

        .expand-hint-inner {
            background: rgba(10,8,20,0.75);
            color: #F0EDE8;
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 5px 11px;
            border-radius: 20px;
            border: 1px solid rgba(123,79,255,0.5);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ── Expanded state ── */
        .inset.is-expanded {
            top: 0 !important;
            right: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0 !important;
            z-index: 100;
            transition: top 0.45s cubic-bezier(.22,.68,0,1.2),
                        right 0.45s cubic-bezier(.22,.68,0,1.2),
                        width 0.45s cubic-bezier(.22,.68,0,1.2),
                        height 0.45s cubic-bezier(.22,.68,0,1.2),
                        border-radius 0.45s ease;
        }

        .inset {
            transition: top 0.45s cubic-bezier(.22,.68,0,1.2),
                        right 0.45s cubic-bezier(.22,.68,0,1.2),
                        width 0.45s cubic-bezier(.22,.68,0,1.2),
                        height 0.45s cubic-bezier(.22,.68,0,1.2),
                        border-radius 0.45s ease,
                        border-color 0.4s;
        }

        .inset.is-expanded .tiktok-slot {
            aspect-ratio: unset;
            height: calc(100vh - 36px); /* minus header */
        }

        .inset.is-expanded .tiktok-slot iframe {
            pointer-events: auto; /* allow interaction when expanded */
        }

        .inset.is-expanded .tiktok-slot .expand-hint {
            display: none;
        }

        /* Collapse button (visible only when expanded) */
        .collapse-btn {
            display: none;
            position: absolute;
            top: 6px;
            left: 10px;
            background: rgba(10,8,20,0.7);
            border: 1px solid rgba(123,79,255,0.4);
            color: #F0EDE8;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 3px 9px;
            border-radius: 12px;
            cursor: pointer;
            z-index: 5;
        }

        .inset.is-expanded .collapse-btn { display: block; }
        .inset.is-expanded .inset-label  { margin-left: 60px; }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .inset { width: 240px; }
        }

        @media (max-width: 600px) {
            .inset { width: 180px; top: 2%; right: 2%; }
        }

        @media (max-width: 480px) {
            .icon-btn { width: 38px; height: 38px; font-size: 0.9rem; }
            .icon-row { gap: 8px; }
            .hud { padding-bottom: 6%; }
            .inset { display: none; }
        }
    </style>
</head>
<body>

    <!-- ══════════════════════════════════════

    <!-- Twitch embed SDK -->
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>

    <script>
        // ── Twitch live detection + player swap ────────────────────────────
        const TWITCH_CHANNEL = 'JackieUnchained';

        const inset      = document.getElementById('inset');
        const livePlayer = document.getElementById('live-player');
        const insetLabel = document.getElementById('inset-label');
        const insetIcon  = document.getElementById('inset-icon');

        const mountDiv = document.createElement('div');
        mountDiv.style.cssText = 'position:absolute;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;';
        document.body.appendChild(mountDiv);

        const player = new Twitch.Player(mountDiv, {
            channel:    TWITCH_CHANNEL,
            width:      '100%',
            height:     '100%',
            muted:      true,
            autoplay:   true,
            allowfullscreen: false,
        });

        player.addEventListener(Twitch.Player.ONLINE, () => {
            const iframe = mountDiv.querySelector('iframe');
            if (iframe) {
                iframe.style.cssText = '';
                livePlayer.appendChild(iframe);
            }
            inset.classList.add('is-live');
            insetLabel.textContent = 'Live now';
            insetIcon.className = 'fab fa-twitch inset-header-icon';
            insetIcon.style.color = '#9146FF';
            insetIcon.style.opacity = '1';
            // hide tiktok when live
            const tiktokSlot = document.getElementById('tiktok-slot');
            if (tiktokSlot) tiktokSlot.style.display = 'none';
        });

        player.addEventListener(Twitch.Player.OFFLINE, () => {
            const iframe = livePlayer.querySelector('iframe');
            if (iframe) mountDiv.appendChild(iframe);
            inset.classList.remove('is-live');
            insetLabel.textContent = 'Sponsored';
            insetIcon.style.color = '';
            insetIcon.style.opacity = '0.7';
            const tiktokSlot = document.getElementById('tiktok-slot');
            if (tiktokSlot) tiktokSlot.style.display = '';
        });

        // ── TikTok expand / collapse ───────────────────────────────────────
        const tiktokSlot = document.getElementById('tiktok-slot');
        const collapseBtn = document.getElementById('collapse-btn');

        tiktokSlot.addEventListener('click', () => {
            inset.classList.add('is-expanded');
            // enable controls when expanded
            const iframe = document.getElementById('tiktok-iframe');
            if (iframe) {
                iframe.src = 'https://www.tiktok.com/player/v1/7571170623410490679?autoplay=1&mute=1&loop=1&controls=1&rel=0';
            }
        });

        collapseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            inset.classList.remove('is-expanded');
            // restore minimal controls
            const iframe = document.getElementById('tiktok-iframe');
            if (iframe) {
                iframe.src = 'https://www.tiktok.com/player/v1/7571170623410490679?autoplay=1&mute=1&loop=1&controls=0&rel=0';
            }
        });

        // Close on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && inset.classList.contains('is-expanded')) {
                collapseBtn.click();
            }
        });

        // ── Cursor-driven shadow effects ───────────────────────────────────
        //
        // Moves a soft directional drop-shadow on the site title + icon buttons
        // based on cursor position relative to center of the viewport,
        // as if there's a light source tracking the mouse.

        const siteTitle = document.querySelector('.site-title');
        const iconBtns  = document.querySelectorAll('.icon-btn');

        document.addEventListener('mousemove', (e) => {
            const cx = window.innerWidth  / 2;
            const cy = window.innerHeight / 2;
            const dx = (e.clientX - cx) / cx;   // -1 … +1
            const dy = (e.clientY - cy) / cy;

            // Shadow offset: opposite direction of cursor (light source effect)
            const ox = (-dx * 14).toFixed(1);
            const oy = (-dy * 14).toFixed(1);
            const dist = Math.hypot(dx, dy);       // 0 … ~1.41
            const blur = (8 + dist * 18).toFixed(1);

            // Title — warm glow color shifts subtly toward cursor quadrant
            const r = Math.round(80 + dx * 40);
            const g = Math.round(50 + dy * 20);
            const b = Math.round(180 + dist * 60);

            siteTitle.style.filter =
                `drop-shadow(${ox}px ${oy}px ${blur}px rgba(0,0,0,0.95)) ` +
                `drop-shadow(0 0 ${(20 + dist*28).toFixed(0)}px rgba(${r},${g},${b},0.22))`;

            // Icon buttons — subtle glow pointing away from cursor
            const iconGlow = `drop-shadow(${(ox*0.5).toFixed(1)}px ${(oy*0.5).toFixed(1)}px ${(4+dist*8).toFixed(1)}px rgba(0,0,0,0.8))`;
            iconBtns.forEach(btn => { btn.style.filter = iconGlow; });

            // Inset panel — faint parallax shadow
            if (!inset.classList.contains('is-expanded')) {
                inset.style.boxShadow =
                    `${(ox*0.6).toFixed(1)}px ${(oy*0.6).toFixed(1)}px ${(24+dist*20).toFixed(0)}px rgba(0,0,0,0.7), ` +
                    `0 0 ${(30+dist*30).toFixed(0)}px rgba(123,79,255,${(0.05+dist*0.12).toFixed(2)})`;
            }
        });
    </script>
